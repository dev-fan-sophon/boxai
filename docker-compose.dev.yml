# Local data plane only — Postgres + Redis for optional local API development.
# The application is NOT containerized here. Run the API on the host:
#   export SQL_DSN='postgresql://root:123456@127.0.0.1:5432/new-api?sslmode=disable'
#   export REDIS_CONN_STRING='redis://127.0.0.1:6379/0'
#   go run main.go
#
# Default frontend workflow proxies to production (make dev-web).
# Use make dev-web-local when pointing at this local API.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down

services:
  redis:
    image: redis:7-alpine
    container_name: new-api-dev-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - dev-network

  postgres:
    image: postgres:15-alpine
    container_name: new-api-dev-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
    volumes:
      - dev_pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  dev_pg_data:

networks:
  dev-network:
    driver: bridge
