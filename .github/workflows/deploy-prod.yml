name: Deploy production

# Native host deploy: SSH → /opt/boxai build → systemctl restart boxai
# Postgres/Redis stay on Docker (docker-compose.infra.yml).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref/SHA to deploy (empty = this workflow commit)"
        required: false
        type: string
      bootstrap:
        description: "Run first-time host bootstrap"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.sha }}

      - name: Resolve deploy ref
        id: meta
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.ref }}" ]]; then
            REF_IN="${{ inputs.ref }}"
          else
            REF_IN="${GITHUB_SHA}"
          fi
          REF="$(git rev-parse --short=12 "$REF_IN")"
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "Deploying ref=${REF}"

      - name: Deploy
        env:
          BOXAI_SSH_HOST: ${{ secrets.BOXAI_SSH_HOST }}
          BOXAI_SSH_USER: ${{ secrets.BOXAI_SSH_USER }}
          BOXAI_SSH_PORT: ${{ secrets.BOXAI_SSH_PORT }}
          BOXAI_SSH_PRIVATE_KEY: ${{ secrets.BOXAI_SSH_PRIVATE_KEY }}
          BOXAI_SSH_HOST_KEY: ${{ secrets.BOXAI_SSH_HOST_KEY }}
          BOXAI_BASE_URL: ${{ secrets.BOXAI_BASE_URL }}
        run: |
          set -euo pipefail
          : "${BOXAI_SSH_HOST:?missing secret BOXAI_SSH_HOST}"
          : "${BOXAI_SSH_USER:?missing secret BOXAI_SSH_USER}"
          : "${BOXAI_SSH_PRIVATE_KEY:?missing secret BOXAI_SSH_PRIVATE_KEY}"
          : "${BOXAI_SSH_HOST_KEY:?missing secret BOXAI_SSH_HOST_KEY}"
          ARGS=(--ref "${{ steps.meta.outputs.ref }}")
          if [[ "${{ inputs.bootstrap }}" == "true" ]]; then
            ARGS+=(--bootstrap)
          fi
          bash ./scripts/deploy-prod.sh "${ARGS[@]}"

      - name: Public health check
        if: always()
        env:
          BOXAI_BASE_URL: ${{ secrets.BOXAI_BASE_URL }}
        run: |
          set -euo pipefail
          BASE="${BOXAI_BASE_URL:-https://you-box.com}"
          curl -fsS --retry 5 --retry-delay 2 --retry-all-errors \
            "${BASE%/}/api/status" | head -c 300
          echo
